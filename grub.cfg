# grub.cfg - GRUB2 configuration for UEFI boot

set timeout=3
set default=0

menuentry "Mesa OS v0.1.0" {
    insmod all_video
    insmod gfxterm
    terminal_output gfxterm
    
    multiboot2 /boot/mesa_kernel
}

menuentry "Mesa OS (Recovery)" {
    insmod all_video
    insmod gfxterm
    terminal_output gfxterm
    
    multiboot2 /boot/mesa_kernel recovery=1
}
